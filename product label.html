<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="product label.css">
  <title>Product Label Generator</title>
  
  <style>
    body {
      font-family: Arial;
    }

    .label {
      width: 250px;
      border: 2px solid black;
      padding: 10px;
      margin-top: 20px;
    }

    .title {
     text-transform: uppercase;
     font-weight: bold;
     font-size: 18px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
    }

    @media print {
      body * {
        visibility: hidden;
      }
      #output, #output * {
        visibility: visible;
      }
      #output {
        position: absolute;
        top: 0;
        left: 0;
      }
    }
  </style>
</head>

<body>

<h2>Generate Product Label</h2>

<form onsubmit="generateAndPrint(event)">
  <label>Nama Produk:</label><br>
  <input type="text" id="productName" required><br><br>

  <label>Tarikh Packing:</label><br>
  <input type="date" id="packingDate" required><br><br>

  <label>Tempoh Best Before (hari):</label><br>
  <input type="number" id="duration" value="7" min="1" required>
  <small>Contoh: 7 hari, 14 hari, 30 hari</small>
  <br><br>

  <label>Harga (RM):</label><br>
  <input type="number" id="price" required><br><br>

  <button type="submit">Generate & Print Label</button>
</form>

<!-- Output -->
<div id="output"></div>

<script>
function generateAndPrint(event) {
  event.preventDefault();

  let name = document.getElementById("productName").value;
  let packingDate = document.getElementById("packingDate").value;
  let days = parseInt(document.getElementById("duration").value);
  let price = document.getElementById("price").value;

  // 🔥 Kira expiry date
  let packDateObj = new Date(packingDate);
  packDateObj.setDate(packDateObj.getDate() + days);

  let expiryDate = packDateObj.toISOString().split("T")[0];

  document.getElementById("output").innerHTML = `
 <div class="label">
  <div class="title">${name}</div>

  <div class="info">Packing: ${packingDate}</div>
  <div class="info expiry">EXP: ${expiryDate}</div>
  <div class="info price">RM ${price}</div>
</div>
  `;

  setTimeout(() => {
    window.print();
  }, 300);
}
</script>

</body>
</html>
