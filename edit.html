<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
</head>
<body>

<h2>Edit Profile</h2>

<form id="editForm">

    Name: <input type="text" id="name"><br><br>
    Product: <input type="text" id="product"><br><br>
    Price: <input type="text" id="price"><br><br>

    <button type="submit">Update</button>

</form>

<script>
let index = localStorage.getItem("editIndex");

let members = JSON.parse(localStorage.getItem("members")) || [];

// isi data lama
document.getElementById("name").value = members[index].name;
document.getElementById("product").value = members[index].product;
document.getElementById("price").value = members[index].price;

// update data
document.getElementById("editForm").addEventListener("submit", function(e){
    e.preventDefault();

    members[index].name = document.getElementById("name").value;
    members[index].product = document.getElementById("product").value;
    members[index].price = document.getElementById("price").value;

    localStorage.setItem("members", JSON.stringify(members));

    alert("Profile updated!");
    window.location.href = "memberlist.html";
});
</script>

</body>
</html>
