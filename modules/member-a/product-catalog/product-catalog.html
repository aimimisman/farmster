<!DOCTYPE html>
<html>
<head>
    <title>Product Catalog</title>
    <link rel="stylesheet" href="product-catalog.css">
</head>

<body>
<!-- HEADER -->
    <div class="header">
        <div class="logo">Product Catalog</div>

        <div class="menu">
            <div onclick="goHome()">Home</div>
            <div onclick="goMarketplace()">Market Place</div>
            <div onclick="goMarketPrice()">Market Price</div>
        </div>

        <div class="user"></div>
    </div>

<!-- BANNER -->
<!-- <div class="banner"></div> -->

<div class="page-container">

    <!-- LOGO + INFO ROW -->
    <div class="farm-header-row">
        
        <div class="farm-logo">
            <img src="../../../assets/images/farm-logo.png" alt="farm logo">
        </div>
        
        <!-- INFO -->
        <div class="farm-info">
            <div class="farm-title-row">
                <h2 id="farmTitle">Farm Name</h2>
                <button class="visit-btn">Visit Farm</button>
            </div>
            
            <p class="farm-location"></p>
            <p class="farm-desc"> </p>
        </div>
    </div>
    
    <div class="info-grid">
    
    <div class="info-card">
        <p class="label">Joined</p>
        <h4 id="joinedValue">-</h4>
    </div>

    <div class="info-card">
        <p class="label">Products</p>
        <h4 id="productCount">0</h4>
    </div>

    <div class="info-card">
        <p class="label">Rating</p>
        <h4 id="ratingValue">0 ⭐</h4>
    </div>

    <div class="info-card">
        <p class="label">Followers</p>
        <h4 id="followersValue">0</h4>
    </div>

    </div>

    <div class="title-section" id="productSection">
        <div class="page-title" id="productTitle">Product From</div> 
        <p class="page-subtitle">Browse fresh products from selected farm</p>
    </div>
    
    <!-- PRODUCT GRID -->
    <div class="product-grid" id="productContainer"></div>
    
    <!-- PAGINATION -->
     <div class="pagination"></div>
    
    <!-- DETAIL PANEL / after tekan button view detail (bawah) -->
    <div id="productDetail" class="product-detail hidden"></div>

</div>

<script src="product-catalog.js"></script>


</body>
</html>
