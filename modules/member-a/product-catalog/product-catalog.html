<!DOCTYPE html>
<html>
<head>
    <title>Product Catalog</title>
    <link rel="stylesheet" href="product-catalog.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">FARM</div>

    <input type="text" placeholder="Search product..." class="search">

    <div class="user">👤</div>
</div>

<!-- TITLE -->
<div class="title-section">
    <h2>Product Catalog</h2>
    <p id="farmTitle">Farm Name</p>
</div>

<!-- FILTER -->
<div class="filter-bar">
    <select>
        <option>All Category</option>
        <option>Vegetables</option>
        <option>Fruits</option>
    </select>

    <select>
        <option>Price</option>
        <option>Low to High</option>
        <option>High to Low</option>
    </select>

    <select>
        <option>Sort</option>
        <option>Newest</option>
        <option>Popular</option>
    </select>
</div>

<!-- PRODUCT GRID -->
<div class="product-grid" id="productContainer">
    
</div>

<!-- PAGINATION -->
<div class="pagination">
    <button>Prev</button>
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>Next</button>
</div>

<!-- DETAIL PANEL / after tekan button view detail (bawah) -->
<div id="productDetail" class="product-detail hidden"></div>

<script src="product-catalog.js"></script>
</body>
</html>
