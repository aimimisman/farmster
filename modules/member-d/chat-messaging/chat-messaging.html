<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmster - Chat Messaging</title>
  <link rel="stylesheet" href="chat-messaging.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

  <header class="page-hero">
    <div>
      <span class="tagline">Product Discovery</span>
      <h1>Chat Messaging</h1>
      <p>Browse fresh farm products, filter by category, and view product details easily.</p>
    </div>
  </header>

  <main class="container">

    <div class="section-header">
      <p class="section-label">Product Listing</p>
      <h2>Find Farm Products</h2>
      <p>Search and filter available farm products by name, category, or price range.</p>
      <a href="farmster/modules/member-d/review-rating/review_rating.html" target="_blank">test</a>
      
      <button class="floating-btn" onclick="openChat()" >Contact Farm</button>
      
    </div>

    <!-- POPUP CHAT -->
    <div id="chat-popup" class="chat-popup" style="display:none;">
      
      <div class="phone">

        <!-- ================= CHAT LIST VIEW ================= -->
        <div id="chat-list-view">
          <div class="header">

            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="chat-title">Messages</div>
              <i class="bi bi-chat-left-fill"></i>
            </div>

            <!-- SEARCH -->
            <div class="search-box d-flex align-items-center" id="search-bar">
              <i class="bi bi-search me-2 text-secondary"></i>
              <input type="text" placeholder="Search Direct Messages">
            </div>

          </div>
          <!-- LOADING -->
          <div id="loading-spinner-list" class="loading-container" style="display:flex;">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          
          <!-- CHAT LIST -->
          <div id="chat-list"></div>

        </div>

        <!-- ================= CHAT VIEW ================= -->
        <div id="chat-view" style="display:none;">

          <!-- CHAT HEADER -->
          <div class="header">
            <div id="chat-header"></div>
          </div>

          <!-- LOADING -->
          <div id="loading-spinner-chat" class="loading-container" style="display:flex;">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
      
          <!-- CHAT BOX -->
          <div id="chat-box" class="chat-box">
          </div>

          <!-- INPUT -->
          <div class="input-container">
            <input type="text" id="message-input" placeholder="Type a message">
            <button class="send-btn" onclick="sendMessage()">➤</button>
          </div>

        </div>

      </div>
    </div>

   

    
  </main>


<script src="chat-messaging.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
