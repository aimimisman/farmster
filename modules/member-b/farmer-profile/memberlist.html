<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farmster Community</title>

<link rel="stylesheet" href="memberlist.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #1f4d2c, #3cb371);
}

h2, p { margin: 10px; }

ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  background-color: white;
  display: flex;
}

ul li a {
  display: block;
  color: black;
  padding: 14px 16px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  font-family: Arial, sans-serif;
}

ul li a:hover {
  background-color: white;
  color: green;
}

.header {
    background: linear-gradient(rgba(20, 75, 38, 0.8), rgba(20, 75, 38, 0.8)),
    url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
    background-size: cover;
    background-position: center;
    padding: 60px 20px;
    text-align: center;
    color: white;
}

.header h1 {
    margin: 0;
    font-size: 36px;
}

.main-container {
    background: #fff9c4;
    margin: 30px;
    padding: 30px;
    border-radius: 20px;
}

.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover { transform: translateY(-5px); }

.card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #1f4d2c;
    cursor: pointer;
    transition: 0.3s ease;
}

.card img:hover { transform: scale(1.1); }

.name {
    font-weight: bold;
    margin-top: 10px;
}

.product {
    margin-top: 8px;
    font-size: 14px;
}

.price {
    color: #1f4d2c;
    font-weight: bold;
    margin-top: 5px;
}

.tag {
    display: inline-block;
    padding: 5px 10px;
    margin-top: 8px;
    border-radius: 20px;
    font-size: 12px;
    color: white;
}

.organic { background: #28a745; }

footer {
    text-align: center;
    background: #1f4d2c;
    color: white;
    padding: 15px;
    margin-top: 20px;
}

@media (max-width: 900px) {
    .container { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
    .container { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="header">
    <h1>🌱 Farmster Community</h1>
    <p>Fresh Products Direct From Farmers</p>
</div>

<div class="navbar">
    <ul>
        <li><a id="homeLink">Home</a></li>
        <li><a id="communityLink"> Community</a></li>
        <li><a id="profileLink"> Profile</a></li>
        <li><a id="logoutLink" onclick="logoutUser()"> Logout</a></li>
    </ul>
</div>

<div class="main-container">
    <div class="container" id="memberContainer">
        <p>Loading farmers...</p>
    </div>
</div>

<footer>
    <p>© 2026 Farm Marketplace Platform | Module Assignment Project</p>
</footer>

<script>
const BASE_URL =
window.location.hostname.includes("github.io")
? "https://aimimisman.github.io/farmster"
: "";

const API_URL =

"https://script.google.com/macros/s/AKfycbythF64y6uKVZxgPq7YvkmQph9Z2ty2_2doXm3DoJzHMNH49bd6ieO2XmzHHvu6A8s-1A/exec";
document.getElementById("homeLink").href =
BASE_URL + "/index.html";

document.getElementById("communityLink").href =
BASE_URL + "/modules/member-b/farmer-profile/memberlist.html";

document.getElementById("profileLink").href =
BASE_URL + "/modules/member-b/farmer-profile/update.html";

function logoutUser() {
    localStorage.removeItem("currentUser");

    window.location.href =
    BASE_URL + "/modules/member-b/farmer-profile/login.html";
}

function loadUsers() {
    const container = document.getElementById("memberContainer");

    const currentUser =
    JSON.parse(localStorage.getItem("currentUser"));

    Promise.all([
        fetch(API_URL + "?action=dataprofile").then(res => res.json()),
        fetch(API_URL + "?action=products").then(res => res.json())
    ])
    .then(([profileRes, productRes]) => {

        const users = profileRes.data || [];
        const products = productRes.data || [];

        container.innerHTML = "";

        if (!users.length) {
            container.innerHTML = "<p>No users available.</p>";
            return;
        }

        users.forEach(user => {

            const isCurrentUser =
            currentUser &&
            currentUser.userId === user.userId;

            const realName =
            `${user.firstname || ""} ${user.lastname || ""}`.trim()
            || "Unnamed User";

            const displayName =
            isCurrentUser ? "You" : realName;

            const farmName =
            user.farmsterName || "Farm name not set";

            const location =

[user.district, user.state]

.filter(Boolean)

.join(", ")

||

"Location not set";

            const certification =
            user.certification || "Certification not set";

            const image =
            user.profileImage ||
            "https://ui-avatars.com/api/?name=" +
            encodeURIComponent(realName);

            const productCount =
            products.filter(product =>
                String(product.farmId).trim() ===
                String(user.farmId).trim()
            ).length;

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="${image}" alt="${realName}">

                <div class="name">${displayName}</div>

                <div class="product">🌱 ${farmName}</div>

                <div class="location">📍 ${location}</div>

                <div class="price">
                    ${productCount} product${productCount === 1 ? "" : "s"} available
                </div>

                <div class="tag organic">
                    ${certification}
                </div>
            `;

            container.appendChild(card);
        });
    })
    .catch(err => {
        console.error(err);
        container.innerHTML = "<p>Failed to load users.</p>";
    });
}

loadUsers();
</script>

</body>
</html>
