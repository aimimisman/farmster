<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Farmster Profile</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #fffacd, #00f2fe);
    margin: 0;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.profile-container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.profile {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #1f4d2c;
    margin-bottom: 10px;
}

h2 {
    margin-bottom: 20px;
}

p {
    color: #555;
    font-size: 14px;
}

.btn {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.edit-btn {
    background: #1f4d2c;
    color: white;
}

.logout-btn {
    background: #ff4d4d;
    color: white;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="profile-container">

        <h2>🌱 Farmster Profile</h2>

        <img id="profileImage" src="profile.jpg" class="profile">

        <h3 id="name">Loading...</h3>
        <p id="email">Loading...</p>

        <button class="btn edit-btn" onclick="editProfile()">Edit Profile</button>
        <button class="btn logout-btn" onclick="logout()">Logout</button>

    </div>
</div>
<script>
if (user && users[user]) {
    document.getElementById("name").innerText = users[user].name;
    document.getElementById("email").innerText = users[user].email;
    document.getElementById("profileImage").src = users[user].image;
} else {
    document.getElementById("name").innerText = "User tidak dijumpai";
}
</script>
<script>
const API_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE";

// ambil user dari URL
const params = new URLSearchParams(window.location.search);
const userParam = params.get("user");

// 🔥 LOAD DATA
window.onload = function() {

    fetch(API_URL + "?action=getUser")
    .then(res => res.json())
    .then(data => {

        let user = data[data.length - 1];

        document.getElementById("name").innerText = 
            user[0] + " " + user[1];

        document.getElementById("email").innerText = 
            "Email: " + user[4];

        // OPTIONAL: kalau ada image dalam sheet
        if(user[5]){
            document.getElementById("profileImage").src = user[5];
        }

    })
    .catch(err => {
        console.log(err);
        document.getElementById("name").innerText = "Error loading data";
    });
}

// 🔥 FUNCTION: klik gambar untuk tukar
function changeImage(){
    document.getElementById("imageUpload").click();
}

// 🔥 bila user pilih gambar
document.getElementById("imageUpload").addEventListener("change", function(){

    const file = this.files[0];
    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            // preview image
            document.getElementById("profileImage").src = e.target.result;

            // OPTIONAL: simpan sementara (localStorage)
            localStorage.setItem("profileImage", e.target.result);
        }

        reader.readAsDataURL(file);
    }
});

// 🔥 load image dari localStorage (kalau ada)
window.addEventListener("load", function(){
    const savedImage = localStorage.getItem("profileImage");
    if(savedImage){
        document.getElementById("profileImage").src = savedImage;
    }
});

// navigation
function editProfile(){
    window.location.href = "update.html";
}

function logout(){
    window.location.href = "login.html";
}
</script>

</body>
</html>
