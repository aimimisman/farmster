<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Farm Profile | Farmster</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #1f4d2c, #3cb371);
}

ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    background-color: white;
    display: flex;
}

ul li a {
    display: block;
    color: black;
    padding: 14px 16px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
}

ul li a:hover {
    background-color: white;
    color: green;
}

.header {
    background: linear-gradient(rgba(20, 75, 38, 0.8), rgba(20, 75, 38, 0.8)),
    url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
    background-size: cover;
    background-position: center;
    padding: 60px 20px;
    text-align: center;
    color: white;
}

.header h1 {
    margin: 0;
    font-size: 36px;
}

.main-container {
    background: #fff9c4;
    margin: 30px;
    padding: 30px;
    border-radius: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    margin-bottom: 25px;
}

h2 {
    color: #1f4d2c;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 12px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

textarea {
    min-height: 70px;
}

#map {
    height: 300px;
    border-radius: 12px;
    border: 1px solid #ddd;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 10px 16px;
    border: none;
    border-radius: 20px;
    background: #28a745;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #1f4d2c;
}

.product-box {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 15px;
    margin-top: 15px;
    background: #f8fff8;
}

footer {
    text-align: center;
    background: #1f4d2c;
    color: white;
    padding: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">
    <h1>🧑‍🌾 Edit Farm Profile</h1>
    <p>Update your farm information and products</p>
</div>

<div class="navbar">
    <ul>
        <li><a id="homeLink">🏠 Home</a></li>
        <li><a id="communityLink">👥 Community</a></li>
        <li><a id="profileLink">🧑‍🌾 Profile</a></li>
        <li><a onclick="logoutUser()">➕ Logout</a></li>
    </ul>
</div>

<div class="main-container">

    <div class="card">
        <h2>Farm Information</h2>

        <label>Farm Name</label>
        <input type="text" id="farmName">

        <label>Location Coordinate</label>
        <input type="text" id="location" readonly placeholder="Click on map to select location">

        <div id="map"></div>

        <label>State</label>
        <input type="text" id="state" readonly placeholder="State will appear automatically">

        <label>District / City</label>
        <input type="text" id="district" readonly placeholder="District will appear automatically">

        <label>Certification / Label</label>
        <select id="certification">
            <option value="">Certification not set</option>
            <option value="Organic">Organic</option>
            <option value="Pesticide-Free">Pesticide-Free</option>
            <option value="Conventional">Conventional</option>
            <option value="MyGAP Certified">MyGAP Certified</option>
        </select>

        <label>Description</label>
        <textarea id="farmDescription"></textarea>

        <label>Farm Image URL</label>
        <input type="text" id="farmImage">

        <button onclick="saveFarmProfile()">Save Farm Profile</button>
    </div>

    <div class="card">
        <h2>My Products</h2>

        <div id="productList">
            Loading products...
        </div>

        <button onclick="addProductForm()">+ Add Product</button>
    </div>

</div>

<footer>
    <p>© 2026 Farm Marketplace Platform | Module Assignment Project</p>
</footer>

<script>
const BASE_URL =
window.location.hostname.includes("github.io")
? "https://aimimisman.github.io/farmster"
: "";

const API_URL =
"https://script.google.com/macros/s/AKfycbxGwkquRFThhlRLUI0jhY-sdGj2G0j_Amab2kV9lo908zevKlsaC4lnRX9TC6Xt9btTvQ/exec";

document.getElementById("homeLink").href =
BASE_URL + "/index.html";

document.getElementById("communityLink").href =
BASE_URL + "/modules/member-b/farmer-profile/memberlist.html";

document.getElementById("profileLink").href =
BASE_URL + "/modules/member-b/farmer-profile/update.html";

const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser) {
    alert("Please login first.");
    window.location.href =
    BASE_URL + "/modules/member-b/farmer-profile/login.html";
}

function loadData() {
    document.getElementById("farmName").value =
    currentUser.farmsterName || "";

    document.getElementById("location").value =
    currentUser.location || "";

    document.getElementById("state").value =
    currentUser.state || "";

    document.getElementById("district").value =
    currentUser.district || "";

    document.getElementById("certification").value =
    currentUser.certification || "";

    document.getElementById("farmDescription").value =
    currentUser.description || "";

    document.getElementById("farmImage").value =
    currentUser.profileImage || "";

    loadProducts();
}

function initMap() {
    let defaultLat = 1.4927;
    let defaultLng = 103.7414;

    const savedLocation =
    document.getElementById("location").value;

    if (savedLocation) {
        const split = savedLocation.split(",");

        if (split.length === 2) {
            const lat = parseFloat(split[0]);
            const lng = parseFloat(split[1]);

            if (!isNaN(lat) && !isNaN(lng)) {
                defaultLat = lat;
                defaultLng = lng;
            }
        }
    }

    const map =
    L.map("map")
    .setView([defaultLat, defaultLng], 10);

    L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { maxZoom: 19 }
    ).addTo(map);

    let marker =
    L.marker([defaultLat, defaultLng])
    .addTo(map);

    map.on("click", function(e) {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);

        marker.setLatLng([lat, lng]);

        document.getElementById("location").value =
        `${lat}, ${lng}`;

        getAddressFromCoordinate(lat, lng);
    });
}

function getAddressFromCoordinate(lat, lng) {
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
    .then(res => res.json())
    .then(data => {
        const address = data.address || {};

        document.getElementById("state").value =
        address.state || "";

        document.getElementById("district").value =
        address.city ||
        address.town ||
        address.village ||
        address.county ||
        address.municipality ||
        "";
    })
    .catch(err => {
        console.error(err);
        alert("Location selected, but state/district could not be detected.");
    });
}

function loadProducts() {
    fetch(API_URL + "?action=products")
    .then(res => res.json())
    .then(res => {
        const products = res.data || [];

        const myProducts =
        products.filter(product =>
            String(product.farmId).trim() ===
            String(currentUser.farmId).trim()
        );

        const container =
        document.getElementById("productList");

        container.innerHTML = "";

        if (myProducts.length === 0) {
            container.innerHTML =
            "<p>No products yet.</p>";
        }

        myProducts.forEach(product => {
            createProductForm(product);
        });
    });
}

function createProductForm(product = {}) {
    const container =
    document.getElementById("productList");

    const box =
    document.createElement("div");

    box.className = "product-box";

    box.innerHTML = `
        <input type="hidden" class="productId" value="${product.productId || ""}">

        <label>Product Name</label>
        <input type="text" class="productName" value="${product.productName || ""}">

        <label>Price</label>
        <input type="number" class="priceInput" value="${product.price || ""}">

        <label>Category</label>
        <input type="text" class="categoryInput" value="${product.category || ""}">

        <label>Quantity</label>
        <input type="text" class="quantityInput" value="${product.quantity || ""}">

        <label>Description</label>
        <textarea class="descriptionInput">${product.description || ""}</textarea>

        <label>Image URL</label>
        <input type="text" class="imageInput" value="${product.image || ""}">

        <button onclick="saveProduct(this)">Save Product</button>
    `;

    container.appendChild(box);
}

function addProductForm() {
    createProductForm({});
}

function saveFarmProfile() {
    const data = {
        userId: currentUser.userId,
        farmId: currentUser.farmId,
        farmsterName: document.getElementById("farmName").value.trim(),
        location: document.getElementById("location").value.trim(),
        state: document.getElementById("state").value.trim(),
        district: document.getElementById("district").value.trim(),
        certification: document.getElementById("certification").value,
        description: document.getElementById("farmDescription").value.trim(),
        profileImage: document.getElementById("farmImage").value.trim()
    };

    fetch(API_URL + "?action=updateprofile", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        alert(res.data?.message || res.message || "Profile updated");

        localStorage.setItem(
            "currentUser",
            JSON.stringify({
                ...currentUser,
                ...data
            })
        );
    });
}

function saveProduct(button) {
    const box =
    button.closest(".product-box");

    const data = {
        productId: box.querySelector(".productId").value,
        farmId: currentUser.farmId,
        productName: box.querySelector(".productName").value.trim(),
        price: box.querySelector(".priceInput").value.trim(),
        category: box.querySelector(".categoryInput").value.trim(),
        quantity: box.querySelector(".quantityInput").value.trim(),
        description: box.querySelector(".descriptionInput").value.trim(),
        image: box.querySelector(".imageInput").value.trim()
    };

    fetch(API_URL + "?action=saveproduct", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        alert(res.data?.message || res.message || "Product saved");
        loadProducts();
    });
}

function logoutUser() {
    localStorage.removeItem("currentUser");

    window.location.href =
    BASE_URL + "/modules/member-b/farmer-profile/login.html";
}

loadData();
initMap();
</script>

</body>
</html>
