<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Farm Profile | Farmster</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:
    radial-gradient(circle at top left,#1b4332 0%,transparent 35%),
    radial-gradient(circle at bottom right,#2d6a4f 0%,transparent 30%),
    #081c15;
    color:white;
    min-height:100vh;
}

/* NAVBAR */

.navbar{
    position:sticky;
    top:0;
    z-index:999;
    backdrop-filter:blur(16px);
    background:rgba(8,28,21,0.75);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

ul{
    list-style:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    padding:18px;
}

ul li a{
    color:#d8f3dc;
    text-decoration:none;
    padding:12px 22px;
    border-radius:14px;
    transition:0.3s ease;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
}

ul li a:hover{
    background:#52b788;
    color:#081c15;
    transform:translateY(-2px);
}

/* HEADER - MODERN FORMAL */

.header {
    background:
        linear-gradient(
            90deg,
            rgba(8, 28, 21, 0.92) 0%,
            rgba(8, 28, 21, 0.82) 45%,
            rgba(8, 28, 21, 0.45) 100%
        ),
        url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");

    background-size: cover;
    background-position: center;
    min-height: 360px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;

    padding: 80px 8%;
    color: white;
    position: relative;
    overflow: hidden;
}

/* subtle premium line */
.header::after {
    content: "";
    position: absolute;
    left: 8%;
    bottom: 55px;
    width: 90px;
    height: 5px;
    border-radius: 999px;
    background: linear-gradient(90deg, #52b788, #d8f3dc);
}

/* small label */
.header::before {
    content: "FARMSTER MANAGEMENT";
    display: inline-block;
    position: relative;
    z-index: 2;

    margin-bottom: 16px;
    padding: 8px 16px;

    border-radius: 999px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.22);

    color: #d8f3dc;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.8px;
}

.header h1 {
    position: relative;
    z-index: 2;

    max-width: 720px;
    margin: 0;

    font-size: clamp(36px, 5vw, 64px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1px;

    color: #ffffff;
    text-align: left;
    text-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
}

.header p {
    position: relative;
    z-index: 2;

    max-width: 620px;
    margin-top: 18px;

    font-size: 18px;
    line-height: 1.7;
    color: #d8f3dc;
    text-align: left;
}

/* responsive */
@media (max-width: 768px) {
    .header {
        min-height: 320px;
        padding: 70px 24px;
        align-items: flex-start;
    }

    .header::after {
        left: 24px;
        bottom: 40px;
    }

    .header h1 {
        font-size: 38px;
    }

    .header p {
        font-size: 16px;
    }
}

/* MAIN */

.main-container{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:28px;
}

/* CARD */

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:28px;
    padding:28px;
    box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    inset 0 1px 1px rgba(255,255,255,0.06);
    transition:0.35s ease;
}

.card:hover{
    transform:translateY(-6px);
    border-color:rgba(82,183,136,0.5);
}

.card h2{
    font-size:28px;
    margin-bottom:24px;
    color:#d8f3dc;
}

/* FORM */

label{
    display:block;
    margin-bottom:8px;
    margin-top:18px;
    font-size:14px;
    color:#b7e4c7;
    font-weight:500;
}

input,
textarea,
select{
    width:100%;
    padding:15px 18px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.07);
    color:white;
    font-size:15px;
    outline:none;
    transition:0.25s ease;
    border:1px solid transparent;
}

/* Fix dropdown text visibility */

select {
    background: rgba(255,255,255,0.07);
    color: white;
}

select option {
    background: white;
    color: #081c15;
}

/* bila option dipilih */
select option:checked {
    background: #52b788;
    color: #081c15;
}

input::placeholder,
textarea::placeholder{
    color:#95d5b2;
}

input:focus,
textarea:focus,
select:focus{
    border-color:#52b788;
    background:rgba(255,255,255,0.1);
    box-shadow:0 0 0 4px rgba(82,183,136,0.15);
}

textarea{
    min-height:110px;
    resize:vertical;

    }

.product-error {
    display: none;
    color: red;
    font-size: 13px;
    margin-top: 5px;
}



/* MAP */

#map{
    height:320px;
    border-radius:22px;
    overflow:hidden;
    margin-top:15px;
    border:2px solid rgba(255,255,255,0.08);
}

/* BUTTON */

button{
    margin-top:22px;
    width:100%;
    border:none;
    padding:15px;
    border-radius:18px;
    background:linear-gradient(135deg,#52b788,#2d6a4f);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s ease;
    box-shadow:0 10px 25px rgba(82,183,136,0.3);
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(82,183,136,0.45);
}

/* PRODUCT BOX */

.product-box{
    margin-top:22px;
    padding:22px;
    border-radius:22px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
}

.product-box:hover{
    border-color:rgba(82,183,136,0.35);
}

/* FOOTER */

footer{
    text-align:center;
    padding:30px;
    color:#95d5b2;
    font-size:14px;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:#081c15;
}

::-webkit-scrollbar-thumb{
    background:#2d6a4f;
    border-radius:20px;
}

/* RESPONSIVE */

@media(max-width:900px){

    .main-container{
        grid-template-columns:1fr;
    }

    .header h1{
        font-size:40px;
    }

    ul{
        flex-wrap:wrap;
    }

}

</style>
</head>

<body>

<div class="header">
    <h1>🧑‍🌾 Edit Farm Profile</h1>
    <p>Update your farm information and products</p>
</div>

<div class="navbar">
    <ul>
        <li><a id="homeLink">🏠 Home</a></li>
        <li><a id="communityLink">👥 Community</a></li>
        <li><a id="crowdfundingLink">💰 Crowdfunding</a></li>
        <li><a id="profileLink">🧑‍🌾 Profile</a></li>
        <li><a onclick="logoutUser()">➕ Logout</a></li>
    </ul>
</div>

<div class="main-container">

    <div class="card">
        <h2>Farm Information</h2>

        <label>Farm Name</label>
        <input type="text" id="farmName">

        <label>Location Coordinate</label>
        <input type="text" id="location" readonly placeholder="Click on map to select location">

        <div id="map"></div>

        <label>State</label>
        <input type="text" id="state" readonly placeholder="State will appear automatically">

        <label>District / City</label>
        <input type="text" id="district" readonly placeholder="District will appear automatically">

        <label>Certification / Label</label>
        <select id="certification">
            <option value="">Certification not set</option>
            <option value="Organic">Organic</option>
            <option value="Pesticide-Free">Pesticide-Free</option>
            <option value="Conventional">Conventional</option>
            <option value="MyGAP Certified">MyGAP Certified</option>
        </select>

        <label>Description</label>
        <textarea id="farmDescription"></textarea>

        <label>Farm Image URL</label>
        <input type="text" id="farmImage">

        <button onclick="saveFarmProfile()">Save Farm Profile</button>
    </div>

    <div class="card">
        <h2>My Products</h2>

        <div id="productList">
            Loading products...
        </div>

        <button onclick="addProductForm()">+ Add Product</button>
    </div>

</div>

<footer>
    <p>© 2026 Farm Marketplace Platform | Module Assignment Project</p>
</footer>

<script>
const BASE_URL =
window.location.hostname.includes("github.io")
? "https://aimimisman.github.io/farmster"
: "";

const API_URL =
"https://script.google.com/macros/s/AKfycbxQGdtvTVude_65_W2zb_HNSVyieVngi3dt5n4bYbjmoLUrHGGUlRIMzhTPGEVM7YyRvg/exec";

let allProducts = [];

document.getElementById("homeLink").href =
BASE_URL + "/index.html";

document.getElementById("communityLink").href =
BASE_URL + "/modules/member-b/farmer-profile/memberlist.html";

document.getElementById("profileLink").href =
BASE_URL + "/modules/member-b/farmer-profile/update.html";

document.getElementById("crowdfundingLink").href =
BASE_URL + "/modules/member-e/farm-adoption-crowdfunding/farm-adoption-crowdfunding.html";

const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser) {
    alert("Please login first.");
    window.location.href =
    BASE_URL + "/modules/member-b/farmer-profile/login.html";
}

function loadData() {
    document.getElementById("farmName").value =
    currentUser.farmsterName || "";

    document.getElementById("location").value =
    currentUser.location || "";

    document.getElementById("state").value =
    currentUser.state || "";

    document.getElementById("district").value =
    currentUser.district || "";

    document.getElementById("certification").value =
    currentUser.certification || "";

    document.getElementById("farmDescription").value =
    currentUser.description || "";

    document.getElementById("farmImage").value =
    currentUser.profileImage || "";

    loadProducts();
}

function loadProducts() {


    fetch(API_URL + "?action=products")
    .then(res => res.json())
    .then(res => {
        allProducts = res.data || [];

        const myProducts = allProducts.filter(product =>
            String(product.farmId).trim() ===
            String(currentUser.farmId).trim()
        );

        const container =
        document.getElementById("productList");

        container.innerHTML = "";

        if (myProducts.length === 0) {
            container.innerHTML = "<p>No products yet.</p>";
        }

        myProducts.forEach(product => {
            createProductForm(product);
        });
    })
    .catch(err => {
        console.error(err);
        document.getElementById("productList").innerHTML =
        "<p>Failed to load products.</p>";
    });
}

function normalizeText(text) {
    return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s]/gu, "")
        .replace(/\s+/g, " ");
}

function getUniqueProducts() {
    const seen = new Set();
    const uniqueProducts = [];

    allProducts.forEach(product => {
        const productName =
        String(product.productName || "").trim();

        const productId =
        String(product.productId || "").trim();

        if (!productName || !productId) return;

        const key =
        normalizeText(productName);

        if (!seen.has(key)) {
            seen.add(key);
            uniqueProducts.push(product);
        }
    });

    return uniqueProducts;
}

function getProductOptions(selectedProductId = "") {
    const uniqueProducts =
    getUniqueProducts();

    let options =
    `<option value="">Select existing product</option>`;

    uniqueProducts.forEach(product => {
        const productId =
        String(product.productId || "").trim();

        const productName =
        String(product.productName || "").trim();

        const selected =
        String(selectedProductId).trim() === productId
        ? "selected"
        : "";

        options += `
            <option value="${productId}" data-name="${productName}" ${selected}>
                ${productName} (${productId})
            </option>
        `;
    });

    options +=
    `<option value="NEW_PRODUCT">+ Add New Product</option>`;

    return options;
}

function createProductForm(product = {}) {

    const container =
    document.getElementById("productList");

    const box =
    document.createElement("div");

    box.className = "product-box";

    box.innerHTML = `

        <input
        type="hidden"
        class="productId"
        value="${product.productId || ""}">

        <label>Product Name</label>

        <select
        class="productNameSelect"
        onchange="handleProductSelection(this)">

            ${getProductOptions(
                product.productId || ""
            )}

        </select>

        <input
        type="text"

        class="newProductName"

        placeholder="Enter new product name"

        style="display:none;"

        oninput=
        "validateNewProductName(this)"
        >

        <small class="product-error"></small>


        <div style="display:flex; gap:12px; margin-top:18px;">

    <div style="flex:2;">
        <label>Price (RM)</label>
        <input
        type="number"
        class="priceInput"
        value="${product.price || ""}">
    </div>

    <div style="flex:1;">
        <label>Unit</label>

        <select class="unitInput">
            <option value="">Select Unit</option>

            <option value="kg" ${product.unit==="kg"?"selected":""}>kg</option>
            <option value="g" ${product.unit==="g"?"selected":""}>g</option>

            <option value="ton" ${product.unit==="ton"?"selected":""}>ton</option>

            <option value="bundle" ${product.unit==="bundle"?"selected":""}>bundle</option>

            <option value="pack" ${product.unit==="pack"?"selected":""}>pack</option>

            <option value="box" ${product.unit==="box"?"selected":""}>box</option>

            <option value="tray" ${product.unit==="tray"?"selected":""}>tray</option>

            <option value="basket" ${product.unit==="basket"?"selected":""}>basket</option>

            <option value="piece" ${product.unit==="piece"?"selected":""}>piece</option>

            <option value="bottle" ${product.unit==="bottle"?"selected":""}>bottle</option>

            <option value="litre" ${product.unit==="litre"?"selected":""}>litre</option>
        </select>
    </div>

</div>


        <label>Category</label>

<select class="categoryInput">
    <option value="">Select Category</option>
    <option value="Vegetables" ${product.category==="Vegetables"?"selected":""}>Vegetables</option>
    <option value="Fruits" ${product.category==="Fruits"?"selected":""}>Fruits</option>
    <option value="Herbs & Spices" ${product.category==="Herbs & Spices"?"selected":""}>Herbs & Spices</option>
    <option value="Grains & Cereals" ${product.category==="Grains & Cereals"?"selected":""}>Grains & Cereals</option>
    <option value="Legumes" ${product.category==="Legumes"?"selected":""}>Legumes</option>
    <option value="Root Crops" ${product.category==="Root Crops"?"selected":""}>Root Crops</option>
    <option value="Dairy Products" ${product.category==="Dairy Products"?"selected":""}>Dairy Products</option>
    <option value="Livestock Products" ${product.category==="Livestock Products"?"selected":""}>Livestock Products</option>
    <option value="Organic Products" ${product.category==="Organic Products"?"selected":""}>Organic Products</option>
</select>


        <label>Quantity Available</label>
        
        <input
        type="number"
        class="quantityInput"
        value="${product.quantity || ""}"
        min="0"
        step="0.01"
        placeholder="e.g. 3.5">


        <label>Description</label>

        <textarea
        class="descriptionInput">

        ${product.description || ""}

        </textarea>

        <label>Image URL</label>

        <input
        type="text"

        class="imageInput"

        value=
        "${product.image || ""}">


        <button
        onclick="saveProduct(this)">

        ${product.productId
        ? "Update Product"
        : "Save Product"}

        </button>


        ${product.productId
        ?

        `<button
        onclick="removeProduct(this)">

        Remove Product

        </button>`

        :

        ""

        }

    `;

    container.appendChild(box);

}

function addProductForm() {
    createProductForm({});
}

function handleProductSelection(select) {
    const box =
    select.closest(".product-box");

    const productIdInput =
    box.querySelector(".productId");

    const newProductInput =
    box.querySelector(".newProductName");

    const errorText =
    box.querySelector(".product-error");

    if (select.value === "NEW_PRODUCT") {
        productIdInput.value = "";
        newProductInput.style.display = "block";
        newProductInput.value = "";
        newProductInput.style.border = "1px solid #ccc";
        errorText.style.display = "none";
        errorText.textContent = "";
    } else {
        productIdInput.value = select.value;
        newProductInput.style.display = "none";
        newProductInput.value = "";
        newProductInput.style.border = "1px solid #ccc";
        errorText.style.display = "none";
        errorText.textContent = "";
    }
}

function isDuplicateProductName(productName) {
    const inputName =
    normalizeText(productName);

    return allProducts.some(product =>
        normalizeText(product.productName) === inputName
    );
}

function validateNewProductName(input) {
    const box =
    input.closest(".product-box");

    const errorText =
    box.querySelector(".product-error");

    const value =
    input.value.trim();

    const clean =
    normalizeText(value);

    if (!value || clean.length < 2) {
        input.style.border = "1px solid #ccc";
        errorText.style.display = "none";
        errorText.textContent = "";
        return false;
    }

    if (isDuplicateProductName(value)) {
        input.style.border = "2px solid red";
        errorText.style.display = "block";
        errorText.textContent =
        "Product already exists. Use existing product.";
        return true;
    }

    input.style.border = "1px solid #ccc";
    errorText.style.display = "none";
    errorText.textContent = "";
    return false;
}

function saveProduct(button){

const box =
button.closest(
".product-box"
);

const productSelect =
box.querySelector(
".productNameSelect"
);

const newProductInput =
box.querySelector(
".newProductName"
);

const errorText =
box.querySelector(
".product-error"
);

let productName="";
let productId="";


if(
productSelect.value
==="NEW_PRODUCT"
){

productName =
newProductInput.value
.trim();

productId="";

}else{

productId =
productSelect.value;

productName =

productSelect.options[
productSelect.selectedIndex
]

?.dataset.name

|| "";

}

const quantityValue =
parseFloat(
box.querySelector(".quantityInput").value
);

if (
isNaN(quantityValue) ||
quantityValue < 0
) {
    alert("Please enter a valid quantity.");
    return;
}

const data={

productId: productId,

farmId: currentUser.farmId,

productName: productName,

price:
box.querySelector(".priceInput").value.trim(),

category:
box.querySelector(".categoryInput").value.trim(),

quantity:
quantityValue,

description:
box.querySelector(".descriptionInput").value.trim(),

unit:
box.querySelector(".unitInput").value.trim(),

image:
box.querySelector(".imageInput").value.trim(),

lastUpdated:
new Date().toISOString()

};


fetch(

API_URL+

"?action=saveproduct",

{

method:"POST",

body:
JSON.stringify(
data
)

}

)

.then(res=>
res.json()
)

.then(res=>{

alert(

res.message ||

"Product saved"

);

loadProducts();

})

.catch(err=>{

console.error(
err
);

alert(

"Failed"

);

});

}

function removeProduct(button){

const box =
button.closest(
".product-box"
);

const productId =
box.querySelector(
".productId"
)
.value;

if(
!productId
){

alert(
"Product ID not found."
);

return;

}

if(
!confirm(
"Remove product?"
)
)
return;

fetch(
API_URL+
"?action=deleteproduct",
{
method:
"POST",

body:
JSON.stringify({
productId:
productId,

farmId:
currentUser.farmId
})
}
)

.then(res=>
res.json()
)

.then(res=>{

if(
res.status === "error"
){

alert(
res.message ||
"Failed to remove product."
);

return;

}

alert(
res.message ||
"Product removed successfully"
);

loadProducts();

})

.catch(err=>{

console.error(
err
);

alert(
"Failed to remove product."
);

});

}
function saveFarmProfile() {
    const data = {
        userId: currentUser.userId,
        farmId: currentUser.farmId,
        farmsterName: document.getElementById("farmName").value.trim(),
        location: document.getElementById("location").value.trim(),
        state: document.getElementById("state").value.trim(),
        district: document.getElementById("district").value.trim(),
        certification: document.getElementById("certification").value,
        description: document.getElementById("farmDescription").value.trim(),
        profileImage: document.getElementById("farmImage").value.trim()
    };

    fetch(API_URL + "?action=updateprofile", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        alert(res.data?.message || res.message || "Profile updated");

        localStorage.setItem(
            "currentUser",
            JSON.stringify({
                ...currentUser,
                ...data
            })
        );
    });
}

function initMap() {
    let defaultLat = 1.4927;
    let defaultLng = 103.7414;

    const savedLocation =
    document.getElementById("location").value;

    if (savedLocation) {
        const split = savedLocation.split(",");

        if (split.length === 2) {
            const lat = parseFloat(split[0]);
            const lng = parseFloat(split[1]);

            if (!isNaN(lat) && !isNaN(lng)) {
                defaultLat = lat;
                defaultLng = lng;
            }
        }
    }

    const map =
    L.map("map").setView([defaultLat, defaultLng], 10);

    L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { maxZoom: 19 }
    ).addTo(map);

    let marker =
    L.marker([defaultLat, defaultLng]).addTo(map);

    map.on("click", function(e) {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);

        marker.setLatLng([lat, lng]);

        document.getElementById("location").value =
        `${lat}, ${lng}`;

        getAddressFromCoordinate(lat, lng);
    });
}

function getAddressFromCoordinate(lat, lng) {
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
    .then(res => res.json())
    .then(data => {
        const address = data.address || {};

        document.getElementById("state").value =
        address.state || "";

        document.getElementById("district").value =
        address.city ||
        address.town ||
        address.village ||
        address.county ||
        address.municipality ||
        "";
    })
    .catch(err => {
        console.error(err);
        alert("Location selected, but state/district could not be detected.");
    });
}

function logoutUser() {
    localStorage.removeItem("currentUser");

    window.location.href =
    BASE_URL + "/modules/member-b/farmer-profile/login.html";
}

loadData();
initMap();
</script>
