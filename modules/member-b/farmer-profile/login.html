<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Farmster Login</title>

    <!-- FIXED CSS LINK -->
    <link rel="stylesheet" href="login.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            /* 🌾 FARMING FIELD BACKGROUND */
            background: 
              
                url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }

        /* LEFT LOGIN BOX */
        .box {
            background:#f7faf5;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1f4d2c;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
        }

        button:hover {
            background: #32cd32;
            color: white;
        }

        .link {
            margin-top: 10px;
            font-size: 14px;
        }

        .link a {
            color: #007bff;
            text-decoration: none;
        }

        h6 {
            margin-top: 15px;
            color: #333;
        }
    </style>
</head>

<body>

<!-- LEFT SIDE LOGIN BOX -->
<div class="box">
    <h2>Login to Farmster 🌱</h2>


    <form onsubmit="loginUser(event)">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        <p>Don't have an account? <a href="register.html">Sign Up</a></p>
        <p><a href="main.html">Go to Main Website</a></p>
    </div>

    <h6>© 2026 Farm Marketplace Platform | Module Assignment Project</h6>
</div>

<script>
function loginUser(e) {
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    fetch(`YOUR_WEB_APP_URL?email=${email}&password=${password}`)
    .then(res => res.text())
    .then(response => {
        if (response === "SUCCESS") {
            alert("Login successful!");
            window.location.href = "main.html";
        } else {
            alert("Invalid email or password!");
        }
    });
}
</script>

</body>
</html>
